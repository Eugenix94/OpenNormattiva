name: Normattiva Change Monitor

# Read-only API polling — detects new/updated collections and reports.
# Does NOT auto-rebuild or upload data. The user decides when to update.

on:
  schedule:
    - cron: '0 6 * * *'    # Daily 6 AM UTC
  workflow_dispatch:        # Manual trigger

env:
  PYTHON_VERSION: '3.11'

jobs:
  check-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install minimal deps
        run: pip install lxml tqdm

      - name: Check Normattiva API for changes
        id: check
        run: |
          python -c "
          import os
          import json
          import traceback
          from pathlib import Path
          from normattiva_api_client import NormattivaAPI

          summary = {
            'status': 'ok',
            'message': 'All collections up to date.',
            'checked': 0,
            'changed': 0,
            'changes': [],
            'errors': [],
          }

          try:
            api = NormattivaAPI(timeout_s=15, retries=2)
            catalogue = api.get_collection_catalogue()

            # Load existing ETags
            etag_path = Path('data/.etag_cache.json')
            etag_cache = {}
            if etag_path.exists():
              etag_cache = json.loads(etag_path.read_text())

            changes = []
            seen = set()
            for c in catalogue:
              name = c.get('nomeCollezione', c.get('nome'))
              if not name or name in seen:
                continue
              seen.add(name)
              try:
                new_etag = api.check_collection_etag(name, variant='V', format='AKN')
                if not new_etag:
                  continue
                old_etag = etag_cache.get(name)
                if old_etag and old_etag == new_etag:
                  continue
                changes.append({
                  'collection': name,
                  'is_new': old_etag is None,
                  'num_acts': c.get('numeroAtti', 0),
                })
                print(f'  CHANGED: {name} (acts={c.get(\"numeroAtti\",0)}, new={old_etag is None})')
              except Exception as e:
                msg = f'{name}: {e}'
                summary['errors'].append(msg)
                print(f'  ERROR checking {name}: {e}')

            summary['checked'] = len(seen)
            summary['changed'] = len(changes)
            summary['changes'] = changes

            if changes:
              summary['message'] = 'New Normattiva changes detected. Review and update manually.'
              print('::warning::New Normattiva changes detected! Review and update manually.')
            else:
              summary['message'] = 'No new Normattiva updates found.'
              print('No new Normattiva updates found.')

            print(f'Checked {len(seen)} collections: {len(changes)} changed')

          except Exception as e:
            # Keep job successful but make the failure explicit in artifacts and summary.
            summary['status'] = 'error'
            summary['message'] = f'Checker encountered an API/runtime error: {e}'
            summary['errors'].append(str(e))
            summary['traceback'] = traceback.format_exc()
            print(f'::warning::Checker error (non-blocking): {e}')

          Path('change_report.json').write_text(json.dumps(summary, indent=2))

          step_summary = [
            '## Normattiva Change Monitor',
            '',
            f"- Status: **{summary['status']}**",
            f"- Checked collections: **{summary['checked']}**",
            f"- Changed collections: **{summary['changed']}**",
            f"- Message: {summary['message']}",
          ]
          if summary['errors']:
            step_summary.append(f"- Non-blocking errors: **{len(summary['errors'])}**")
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
            f.write('\n'.join(step_summary) + '\n')
          "

      - name: Upload change report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: change-report-${{ github.run_id }}
          path: change_report.json
          retention-days: 30
