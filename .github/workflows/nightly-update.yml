name: Normattiva-Lab Continuous Pipeline

on:
  schedule:
    - cron: '30 3 * * *'   # Daily: align from master + nightly variant refresh
    - cron: '0 4 * * 0'    # Weekly: full all-collections rebuild
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild of all collections and all variants'
        required: false
        default: 'false'
        type: boolean

env:
  HF_MASTER_DATASET_REPO: diatribe00/normattiva-data
  HF_DATASET_REPO: diatribe00/normattiva-lab-data
  HF_SPACE_REPO: diatribe00/normattiva-lab
  PYTHON_VERSION: '3.11'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 420

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare directories
        run: mkdir -p data/raw data/processed logs

      - name: Download base DB from master dataset
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import hf_hub_download

          token = os.environ.get('HF_TOKEN')
          repo_id = os.environ['HF_MASTER_DATASET_REPO']

          print(f'Downloading baseline DB from {repo_id}...')
          cached = hf_hub_download(
              repo_id=repo_id,
              filename='data/laws.db',
              repo_type='dataset',
              token=token,
              local_dir='data',
          )
          size = Path(cached).stat().st_size
          print(f'Baseline DB downloaded: {size/1e9:.2f} GB ({cached})')
          if size < 100_000_000:
              raise RuntimeError(f'Baseline DB too small: {size} bytes')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Download and parse variants
        id: parse
        run: |
          set -o pipefail

          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "0 4 * * 0" ]] || \
             [[ "${{ github.event.inputs.full_rebuild }}" == "true" ]]; then
            echo "Running weekly FULL rebuild for vigente+originale+multivigente (all collections)..."
            python pipeline.py --variants vigente originale multivigente 2>&1 | tee logs/pipeline_full.log
          else
            echo "Running nightly lab update (vigente + multivigente core + abrogati originale)..."
            python pipeline.py --variants vigente multivigente \
              --collections "Leggi" "Decreti Legislativi" "Decreti Legge" \
              "DPR" "DPCM" "DM" "Cost" 2>&1 | tee logs/pipeline_incremental.log
            python pipeline.py --variants originale \
              --collections "Atti normativi abrogati (in originale)" 2>&1 | tee logs/pipeline_abrogati.log
          fi

          echo "parse_done=true" >> "$GITHUB_OUTPUT"
        env:
          PYTHONUNBUFFERED: '1'

      - name: Refresh citations from vigente JSONL
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python insert_citations.py \
            --jsonl data/processed/laws_vigente.jsonl \
            --db data/laws.db 2>&1 | tee logs/insert_citations.log
        env:
          PYTHONUNBUFFERED: '1'

      - name: Build lab variants + bundle exports
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python sync_normattiva_lab_dataset.py \
            --db data/laws.db \
            --processed-dir data/processed \
            --bundle-path data/processed/laws_lab_bundle.jsonl \
            --report-path data/processed/normattiva_lab_sync_report.json \
            2>&1 | tee logs/lab_sync.log
        env:
          PYTHONUNBUFFERED: '1'

      - name: Enrich DB metadata exports
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python - <<'PYEOF'
          from pathlib import Path
          from core.db import LawDatabase

          db = LawDatabase('data/laws.db')
          print('PageRank...')
          db.compute_importance_scores()
          print('Domains...')
          db.detect_law_domains()
          print('Export CSV...')
          db.export_csv(Path('data/laws_summary.csv'))
          print('Export citation graph...')
          db.export_graph_json(Path('data/citation_graph.json'))
          db.close()
          print('Enrichment done')
          PYEOF
        env:
          PYTHONUNBUFFERED: '1'

      - name: Validate lab DB before upload
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python - <<'PYEOF'
          import sqlite3
          import sys
          from pathlib import Path

          db_path = Path('data/laws.db')
          size = db_path.stat().st_size
          print(f'DB size: {size/1e9:.3f} GB ({size:,} bytes)')
          if size < 100_000_000:
              print(f'ERROR: DB too small ({size} bytes)', file=sys.stderr)
              sys.exit(1)

          conn = sqlite3.connect(str(db_path))
          laws = conn.execute('SELECT COUNT(*) FROM laws').fetchone()[0]
          abrog = conn.execute("SELECT COUNT(*) FROM laws WHERE status='abrogated'").fetchone()[0]
          variants = conn.execute('SELECT COUNT(*) FROM law_variants').fetchone()[0]
          mv = conn.execute("SELECT COUNT(*) FROM law_variants WHERE variant='multivigente'").fetchone()[0]
          conn.close()

          print(f'Laws: {laws:,}')
          print(f'Abrogated in laws: {abrog:,}')
          print(f'Law variants total: {variants:,}')
          print(f'Multivigente rows: {mv:,}')

          if laws < 10_000:
              print(f'ERROR: Too few laws ({laws:,})', file=sys.stderr)
              sys.exit(1)
          if variants < laws:
              print('ERROR: law_variants unexpectedly small', file=sys.stderr)
              sys.exit(1)

          print('Validation passed')
          PYEOF

      - name: Upload files to lab dataset
        if: steps.parse.outputs.parse_done == 'true' && env.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['HF_DATASET_REPO']

          uploads = [
              ('data/laws.db', 'data/laws.db', 'Nightly lab update: SQLite DB'),
              ('data/processed/laws_vigente.jsonl', 'data/processed/laws_vigente.jsonl', 'Nightly lab update: vigente JSONL'),
              ('data/processed/laws_originale.jsonl', 'data/processed/laws_originale.jsonl', 'Nightly lab update: originale JSONL'),
              ('data/processed/laws_multivigente.jsonl', 'data/processed/laws_multivigente.jsonl', 'Nightly lab update: multivigente JSONL'),
              ('data/processed/laws_lab_bundle.jsonl', 'data/processed/laws_lab_bundle.jsonl', 'Nightly lab update: all variants bundle'),
              ('data/processed/normattiva_lab_sync_report.json', 'data/processed/normattiva_lab_sync_report.json', 'Nightly lab update: sync report'),
              ('data/laws_summary.csv', 'data/laws_summary.csv', 'Nightly lab update: summary CSV'),
              ('data/citation_graph.json', 'data/citation_graph.json', 'Nightly lab update: citation graph'),
          ]

          for local_file, repo_file, message in uploads:
              p = Path(local_file)
              if not p.exists():
                  print(f'Skip missing: {local_file}')
                  continue
              print(f'Uploading {local_file} ({p.stat().st_size/1e6:.1f} MB) -> {repo_file}')
              api.upload_file(
                  path_or_fileobj=str(p),
                  path_in_repo=repo_file,
                  repo_id=repo_id,
                  repo_type='dataset',
                  commit_message=message,
              )

          print('Upload complete')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Restart lab space
        if: steps.parse.outputs.parse_done == 'true' && env.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os
          import requests

          token = os.environ['HF_TOKEN']
          space = os.environ['HF_SPACE_REPO']
          r = requests.post(
              f'https://huggingface.co/api/spaces/{space}/restart',
              headers={'Authorization': f'Bearer {token}'},
          )
          print(f'Space restart: {r.status_code} {r.text[:300]}')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload logs to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: normattiva-lab-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7
