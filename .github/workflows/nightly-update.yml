name: Normattiva-Lab Nightly Pipeline

on:
  schedule:
    - cron: '0 3 * * 0'   # Weekly Sunday 3 AM UTC — full rebuild (lab is less frequent)
  workflow_dispatch:
    inputs:
      full_rebuild:
        description: 'Full rebuild (all collections incl. multivigente)'
        required: false
        default: 'false'
        type: boolean

env:
  HF_DATASET_REPO: diatribe00/normattiva-lab-data
  HF_SPACE_REPO: diatribe00/normattiva-lab
  PYTHON_VERSION: '3.11'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare directories
        run: mkdir -p data/raw data/processed logs

      - name: Download existing DB from HF Dataset
        run: |
          python - <<'PYEOF'
          import os, sys
          from pathlib import Path
          from huggingface_hub import hf_hub_download
          token = os.environ.get('HF_TOKEN')
          repo_id = os.environ['HF_DATASET_REPO']
          print(f'Downloading existing DB from {repo_id}...')
          try:
              cached = hf_hub_download(
                  repo_id=repo_id,
                  filename='data/laws.db',
                  repo_type='dataset',
                  token=token,
                  local_dir='data',
              )
              size = Path(cached).stat().st_size
              print(f'Downloaded: {size/1e9:.2f} GB at {cached}')
              if size < 100_000_000:
                  print(f'WARNING: Downloaded DB too small ({size} bytes), starting fresh')
                  Path(cached).unlink(missing_ok=True)
              else:
                  import sqlite3
                  conn = sqlite3.connect(cached)
                  count = conn.execute('SELECT COUNT(*) FROM laws').fetchone()[0]
                  conn.close()
                  print(f'Existing DB has {count:,} laws - incremental update will build on top')
          except Exception as e:
              print(f'Could not download existing DB ({e}), starting fresh')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Download & parse laws
        id: parse
        run: |
          set -o pipefail
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "0 2 * * 0" ]] || \
             [[ "${{ github.event.inputs.full_rebuild }}" == "true" ]]; then
            echo "Running FULL rebuild (all collections)..."
            python pipeline.py --variants vigente 2>&1 | tee logs/download.log
          else
            echo "Running incremental update (main collections)..."
            python pipeline.py --variants vigente \
              --collections "Leggi" "Decreti Legislativi" "Decreti Legge" \
              "DPR" "DPCM" "DM" "Cost" 2>&1 | tee logs/download.log
          fi
          echo "parse_done=true" >> "$GITHUB_OUTPUT"
        env:
          PYTHONUNBUFFERED: '1'

      - name: Build DB + insert citations
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python insert_citations.py 2>&1 | tee logs/insert_citations.log
        env:
          PYTHONUNBUFFERED: '1'

      - name: Enrich DB (PageRank, domains, export)
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path
          from core.db import LawDatabase

          db = LawDatabase('data/laws.db')
          print('PageRank...')
          db.compute_importance_scores()
          print('Domains...')
          db.detect_law_domains()
          print('Export CSV...')
          db.export_csv(Path('data/laws_summary.csv'))
          print('Export citation graph...')
          db.export_graph_json(Path('data/citation_graph.json'))
          db.close()
          print('Enrichment done')
          PYEOF
        env:
          PYTHONUNBUFFERED: '1'

      - name: Validate DB before upload
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python - <<'PYEOF'
          import sqlite3, sys
          from pathlib import Path
          db_path = Path('data/laws.db')
          size = db_path.stat().st_size
          print(f'DB size: {size/1e9:.3f} GB ({size:,} bytes)')
          if size < 100_000_000:
              print(f'ERROR: DB too small ({size} bytes) - refusing to upload', file=sys.stderr)
              sys.exit(1)
          conn = sqlite3.connect(str(db_path))
          laws = conn.execute('SELECT COUNT(*) FROM laws').fetchone()[0]
          cits = conn.execute('SELECT COUNT(*) FROM citations').fetchone()[0]
          scored = conn.execute('SELECT COUNT(*) FROM laws WHERE importance_score > 0').fetchone()[0]
          conn.close()
          print(f'Laws: {laws:,}  |  Citations: {cits:,}  |  PageRank scored: {scored:,}')
          if laws < 10000:
              print(f'ERROR: Too few laws ({laws:,}) - incomplete run, refusing to upload', file=sys.stderr)
              sys.exit(1)
          print('Validation passed: DB is safe to upload')
          PYEOF

      - name: Upload JSONL to HF Dataset
        if: steps.parse.outputs.parse_done == 'true' && env.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['HF_DATASET_REPO']
          jsonl = Path('data/processed/laws_vigente.jsonl')
          if jsonl.exists():
              print(f'Uploading {jsonl} ({jsonl.stat().st_size/1e6:.0f} MB)...')
              api.upload_file(
                  path_or_fileobj=str(jsonl),
                  path_in_repo='data/processed/laws_vigente.jsonl',
                  repo_id=repo_id, repo_type='dataset',
                  commit_message='Nightly update: laws JSONL',
              )
              print('JSONL uploaded')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload DB to HF Dataset
        if: steps.parse.outputs.parse_done == 'true' && env.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['HF_DATASET_REPO']
          db = Path('data/laws.db')
          if db.exists():
              print(f'Uploading DB ({db.stat().st_size/1e6:.0f} MB)...')
              api.upload_file(
                  path_or_fileobj=str(db),
                  path_in_repo='data/laws.db',
                  repo_id=repo_id, repo_type='dataset',
                  commit_message='Nightly update: pre-built SQLite DB',
              )
              print('DB uploaded')
          for f, repo_path in [
              ('data/laws_summary.csv', 'data/laws_summary.csv'),
              ('data/citation_graph.json', 'data/citation_graph.json'),
          ]:
              p = Path(f)
              if p.exists():
                  api.upload_file(
                      path_or_fileobj=str(p),
                      path_in_repo=repo_path,
                      repo_id=repo_id, repo_type='dataset',
                      commit_message='Nightly supplemental files',
                  )
                  print(f'Uploaded {f}')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Restart HF Space
        if: steps.parse.outputs.parse_done == 'true' && env.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os, requests
          token = os.environ['HF_TOKEN']
          space = os.environ['HF_SPACE_REPO']
          r = requests.post(
              f'https://huggingface.co/api/spaces/{space}/restart',
              headers={'Authorization': f'Bearer {token}'},
          )
          print(f'Space restart: {r.status_code} {r.text[:200]}')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload logs to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7