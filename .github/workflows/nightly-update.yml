name: Normattiva Nightly Pipeline

on:
  schedule:
    - cron: '0 2 * * *'   # Daily 2 AM UTC — incremental update
    - cron: '0 2 * * 0'   # Weekly Sunday 2 AM UTC — full rebuild with all collections
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Deployment target (production or lab)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - lab
      variants:
        description: 'Variants to download (space-separated, e.g. "vigente" or "vigente multivigente")'
        required: false
        default: 'vigente'
        type: string
      full_rebuild:
        description: 'Full rebuild (all collections)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

concurrency:
  group: nightly-update-${{ github.event.inputs.target_env || 'production' }}
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve target repos and variants
        id: cfg
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target_env }}"
          VARIANTS_INPUT="${{ github.event.inputs.variants }}"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            TARGET="production"
            VARIANTS_INPUT="vigente"
          fi

          if [[ -z "$TARGET" ]]; then
            TARGET="production"
          fi

          if [[ "$TARGET" == "lab" ]]; then
            echo "HF_DATASET_REPO=diatribe00/normattiva-lab-data" >> "$GITHUB_ENV"
            echo "HF_SPACE_REPO=diatribe00/normattiva-lab" >> "$GITHUB_ENV"
          else
            echo "HF_DATASET_REPO=diatribe00/normattiva-data" >> "$GITHUB_ENV"
            echo "HF_SPACE_REPO=diatribe00/normattiva-search" >> "$GITHUB_ENV"
            TARGET="production"
          fi

          if [[ -z "$VARIANTS_INPUT" ]]; then
            VARIANTS_INPUT="vigente"
          fi

          echo "PIPELINE_VARIANTS=$VARIANTS_INPUT" >> "$GITHUB_ENV"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "variants=$VARIANTS_INPUT" >> "$GITHUB_OUTPUT"

          echo "Target env: $TARGET"
          echo "Dataset repo: $HF_DATASET_REPO"
          echo "Space repo: $HF_SPACE_REPO"
          echo "Variants: $VARIANTS_INPUT"

      - name: Prepare directories
        run: mkdir -p data/raw data/processed logs

      - name: Download existing DB from HF Dataset
        id: db
        shell: bash
        run: |
          rm -f data/laws.db
          DB_READY=false
          for ATTEMPT in 1 2 3; do
            echo "DB download attempt $ATTEMPT/3 from $HF_DATASET_REPO"
            if python - <<'PYEOF'
          import os, sys, shutil, sqlite3
          from pathlib import Path
          from huggingface_hub import hf_hub_download

          repo_id = os.environ['HF_DATASET_REPO']
          token = os.environ.get('HF_TOKEN')

          cached = hf_hub_download(
              repo_id=repo_id,
              filename='data/laws.db',
              repo_type='dataset',
              token=token,
          )

          target = Path('data/laws.db')
          target.parent.mkdir(parents=True, exist_ok=True)
          if Path(cached).resolve() != target.resolve():
              shutil.copy(cached, target)

          size = target.stat().st_size
          print(f'Downloaded: {size/1e9:.2f} GB at {target}')
          if size < 100_000_000:
              raise RuntimeError(f'DB too small ({size} bytes)')

          conn = sqlite3.connect(str(target))
          laws = conn.execute('SELECT COUNT(*) FROM laws').fetchone()[0]
          conn.close()
          print(f'Existing DB has {laws:,} laws')
          PYEOF
            then
              DB_READY=true
              break
            fi
            sleep 5
          done

          echo "db_ready=$DB_READY" >> "$GITHUB_OUTPUT"
          echo "DB ready: $DB_READY"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Download & parse laws
        id: parse
        shell: bash
        run: |
          set -o pipefail
          FORCE_FULL=false
          if [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "0 2 * * 0" ]] || \
             [[ "${{ github.event.inputs.full_rebuild }}" == "true" ]]; then
            FORCE_FULL=true
          fi

          if [[ "${{ steps.db.outputs.db_ready }}" != "true" ]]; then
            echo "No valid base DB available. Forcing full rebuild to avoid partial/inconsistent update."
            FORCE_FULL=true
          fi

          if [[ "${{ env.PIPELINE_VARIANTS }}" == *"multivigente"* ]]; then
            echo "Multivigente requested. Forcing full rebuild for consistency across collections."
            FORCE_FULL=true
          fi

          if [[ "$FORCE_FULL" == "true" ]]; then
            echo "Running FULL rebuild (all collections)..."
            python pipeline.py --variants ${{ env.PIPELINE_VARIANTS }} 2>&1 | tee logs/download.log
          else
            echo "Running incremental update (main collections)..."
            python pipeline.py --variants ${{ env.PIPELINE_VARIANTS }} \
              --collections "Leggi" "Decreti Legislativi" "Decreti Legge" \
              "DPR" "DPCM" "DM" "Cost" 2>&1 | tee logs/download.log
          fi
          echo "parse_done=true" >> "$GITHUB_OUTPUT"
        env:
          PYTHONUNBUFFERED: '1'

      - name: Build DB + insert citations
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python insert_citations.py 2>&1 | tee logs/insert_citations.log
        env:
          PYTHONUNBUFFERED: '1'

      - name: Enrich DB (PageRank, domains, export)
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python - <<'PYEOF'
          import json
          from pathlib import Path
          from core.db import LawDatabase

          db = LawDatabase('data/laws.db')
          print('PageRank...')
          db.compute_importance_scores()
          print('Domains...')
          db.detect_law_domains()
          print('Export CSV...')
          db.export_csv(Path('data/laws_summary.csv'))
          print('Export citation graph...')
          db.export_graph_json(Path('data/citation_graph.json'))
          db.close()
          print('Enrichment done')
          PYEOF
        env:
          PYTHONUNBUFFERED: '1'

      - name: Validate DB before upload
        if: steps.parse.outputs.parse_done == 'true'
        run: |
          python - <<'PYEOF'
          import sqlite3, sys
          from pathlib import Path
          db_path = Path('data/laws.db')
          size = db_path.stat().st_size
          print(f'DB size: {size/1e9:.3f} GB ({size:,} bytes)')
          if size < 100_000_000:
              print(f'ERROR: DB too small ({size} bytes) - refusing to upload', file=sys.stderr)
              sys.exit(1)
          conn = sqlite3.connect(str(db_path))
          laws = conn.execute('SELECT COUNT(*) FROM laws').fetchone()[0]
          cits = conn.execute('SELECT COUNT(*) FROM citations').fetchone()[0]
            cols = [r[1] for r in conn.execute("PRAGMA table_info(laws)").fetchall()]
            if 'importance_score' in cols:
              scored = conn.execute('SELECT COUNT(*) FROM laws WHERE importance_score > 0').fetchone()[0]
            else:
              scored = -1
          conn.close()
            if scored >= 0:
              print(f'Laws: {laws:,}  |  Citations: {cits:,}  |  PageRank scored: {scored:,}')
            else:
              print(f'Laws: {laws:,}  |  Citations: {cits:,}  |  PageRank scored: n/a (legacy schema)')
          if laws < 10000:
              print(f'ERROR: Too few laws ({laws:,}) - incomplete run, refusing to upload', file=sys.stderr)
              sys.exit(1)
          print('Validation passed: DB is safe to upload')
          PYEOF

      - name: Upload JSONL to HF Dataset
        if: steps.parse.outputs.parse_done == 'true' && secrets.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['HF_DATASET_REPO']
          for jsonl in sorted(Path('data/processed').glob('laws_*.jsonl')):
              print(f'Uploading {jsonl} ({jsonl.stat().st_size/1e6:.0f} MB)...')
              api.upload_file(
                  path_or_fileobj=str(jsonl),
                  path_in_repo=f'data/processed/{jsonl.name}',
                  repo_id=repo_id, repo_type='dataset',
                  commit_message=f'Nightly update: {jsonl.name}',
              )
              print(f'{jsonl.name} uploaded')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload DB to HF Dataset
        if: steps.parse.outputs.parse_done == 'true' && secrets.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os
          from pathlib import Path
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          repo_id = os.environ['HF_DATASET_REPO']
          db = Path('data/laws.db')
          if db.exists():
              print(f'Uploading DB ({db.stat().st_size/1e6:.0f} MB)...')
              api.upload_file(
                  path_or_fileobj=str(db),
                  path_in_repo='data/laws.db',
                  repo_id=repo_id, repo_type='dataset',
                  commit_message='Nightly update: pre-built SQLite DB',
              )
              print('DB uploaded')
          for f, repo_path in [
              ('data/laws_summary.csv', 'data/laws_summary.csv'),
              ('data/citation_graph.json', 'data/citation_graph.json'),
          ]:
              p = Path(f)
              if p.exists():
                  api.upload_file(
                      path_or_fileobj=str(p),
                      path_in_repo=repo_path,
                      repo_id=repo_id, repo_type='dataset',
                      commit_message='Nightly supplemental files',
                  )
                  print(f'Uploaded {f}')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Restart HF Space
        if: steps.parse.outputs.parse_done == 'true' && secrets.HF_TOKEN != ''
        run: |
          python - <<'PYEOF'
          import os, requests
          token = os.environ['HF_TOKEN']
          space = os.environ['HF_SPACE_REPO']
          r = requests.post(
              f'https://huggingface.co/api/spaces/{space}/restart',
              headers={'Authorization': f'Bearer {token}'},
          )
          print(f'Space restart: {r.status_code} {r.text[:200]}')
          PYEOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

      - name: Upload logs to artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7